packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  # '@prisma/client': set this to true or false
  # better-sqlite3: set this to true or false
  # cpu-features: set this to true or false
  # esbuild: set this to true or false
  # msgpackr-extract: set this to true or false
  # msw: false
  # protobufjs: set this to true or false
  # sharp: true
  # ssh2: set this to true or false
  # unrs-resolver: true

  "@prisma/client": false
  better-sqlite3: false
  cpu-features: false
  esbuild: false
  msgpackr-extract: false
  msw: false
  protobufjs: false
  sharp: false
  ssh2: false
  unrs-resolver: false

minimumReleaseAgeExclude:
  - esbuild@0.24.3 || 0.28.1
  - lodash@4.17.23 || 4.17.24
  - postcss@8.5.10 || 8.5.12
  - uuid@11.1.1
  - js-yaml@4.1.2 || 4.3.0
  - brace-expansion@1.1.16 || 5.0.7
  - "@hono/node-server@2.0.5"
  - fast-uri@3.1.4
  - sharp@0.35.0
  - next@16.2.11
  - find-my-way@9.6.1
