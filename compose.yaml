services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: echo
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d echo"]
      interval: 2s
      timeout: 2s
      retries: 15
    ports:
      - "5432:5432"
    volumes:
      - echo-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
    ports:
      - "6379:6379"
    volumes:
      - echo-redis:/data

volumes:
  echo-postgres:
  echo-redis:
